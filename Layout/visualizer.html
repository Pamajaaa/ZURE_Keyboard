<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Zure Keyboard & Stick Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --key-size: 60px;
    --key-gap: 4px;
    --key-bg: rgba(20, 24, 35, 0.85);
    --key-border: #6a82ad;
    --key-text: #e6ecf5;
    --neon: #00e5ff;
    --neon-glow: #00e5ff;
    --accent: #ff2bd6;
    --combo-glow: #ff2bd6;
  }
  html, body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: transparent;
    color: var(--key-text);
    min-height: 100vh;
    overflow: hidden;
  }
  body.bg-green { background: #00ff00; }
  body.bg-dark  { background: #0a0e1a; }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    padding: 30px 20px;
  }

  /* === Keyboard === */
  #keyboard {
    position: relative;
  }
  .key {
    position: absolute;
    width: var(--key-size);
    height: var(--key-size);
    background: var(--key-bg);
    border: 2px solid var(--key-border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--key-text);
    transition: all 0.06s ease-out;
    text-shadow: 0 0 4px rgba(0,0,0,0.6);
    user-select: none;
    letter-spacing: 0.5px;
    box-shadow:
      0 0 0 1px rgba(140, 170, 210, 0.18),
      inset 0 0 10px rgba(120, 150, 200, 0.08),
      0 2px 4px rgba(0, 0, 0, 0.3);
  }
  .key.active {
    background: rgba(0, 229, 255, 0.28);
    border-color: var(--neon);
    color: #ffffff;
    box-shadow:
      0 0 8px  var(--neon-glow),
      0 0 18px var(--neon-glow),
      0 0 32px rgba(0, 229, 255, 0.6),
      inset 0 0 12px rgba(0, 229, 255, 0.35);
    text-shadow:
      0 0 6px  var(--neon-glow),
      0 0 12px var(--neon-glow);
    transform: translateY(1px) scale(0.96);
  }
  .key.combo {
    background: rgba(255, 43, 214, 0.28);
    border-color: var(--combo-glow);
    color: #ffffff;
    box-shadow:
      0 0 8px  var(--combo-glow),
      0 0 18px var(--combo-glow),
      0 0 32px rgba(255, 43, 214, 0.55),
      inset 0 0 12px rgba(255, 43, 214, 0.35);
    text-shadow:
      0 0 6px  var(--combo-glow),
      0 0 12px var(--combo-glow);
  }

  /* === Sticks === */
  #stick-container {
    display: flex;
    align-items: flex-start;
    gap: 50px;
  }
  .stick-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .stick {
    position: relative;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background:
      radial-gradient(circle at center,
        rgba(20,24,35,0.9) 0%,
        rgba(10,14,26,0.95) 80%);
    border: 2px solid #2a3550;
    box-shadow:
      0 0 14px rgba(0, 229, 255, 0.18),
      inset 0 0 18px rgba(0, 229, 255, 0.05);
  }
  .stick .axis {
    position: absolute;
    background: rgba(150, 170, 200, 0.15);
  }
  .stick .axis.h { left: 6px; right: 6px; top: 50%; height: 1px; }
  .stick .axis.v { top: 6px; bottom: 6px; left: 50%; width: 1px; }
  .stick .ring {
    position: absolute;
    inset: 22%;
    border-radius: 50%;
    border: 1px dashed rgba(0, 229, 255, 0.22);
  }
  .stick .ring-outer {
    position: absolute;
    inset: 6%;
    border-radius: 50%;
    border: 1px solid rgba(0, 229, 255, 0.12);
  }
  .stick .dot {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow:
      0 0 6px  var(--neon-glow),
      0 0 14px var(--neon-glow),
      0 0 26px rgba(0, 229, 255, 0.55);
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.04s linear, opacity 0.12s linear;
  }
  .stick .angle-line {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 2px;
    height: 32px;
    background: linear-gradient(to top, var(--neon), transparent);
    transform-origin: 50% 0%;
    opacity: 0;
    transition: opacity 0.08s linear;
    pointer-events: none;
    border-radius: 2px;
  }
  .stick-angle {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 18px;
    color: var(--neon);
    text-shadow: 0 0 6px var(--neon-glow);
    letter-spacing: 0.5px;
    min-width: 60px;
    text-align: center;
  }

  /* Bridge status pill */
  #bridge-status {
    position: fixed;
    top: 10px;
    left: 10px;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 12px;
    background: rgba(20, 24, 35, 0.85);
    border: 1px solid #2a3550;
    color: #ff5577;
    z-index: 100;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  #bridge-status:hover { opacity: 1; }
  #bridge-status.ok { color: #50ffaa; border-color: #50ffaa; }

  /* Debug overlay */
  #debug-log {
    position: fixed;
    bottom: 10px;
    left: 10px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    color: #ffe55a;
    background: rgba(10, 14, 26, 0.95);
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid rgba(255, 229, 90, 0.35);
    z-index: 100;
    pointer-events: none;
    max-width: 560px;
    line-height: 1.65;
    white-space: pre;
  }
  #debug-log.hidden { display: none; }
  #debug-log .dbg-down  { color: #50ffaa; }
  #debug-log .dbg-up    { color: #ff8888; }
  #debug-log .dbg-bridge{ color: #88ddff; }
  #debug-log .dbg-native{ color: #ffaa55; }
  #debug-log .dbg-flash { color: #ff66dd; font-weight: 700; }
  #debug-log .dbg-unmap { color: #888; }
  #debug-log .dbg-head  { color: #aab2c0; font-size: 11px; margin-bottom: 4px; display: block; border-bottom: 1px solid #333; padding-bottom: 4px; }

  /* === Controls === */
  #controls {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
    z-index: 100;
    opacity: 0.55;
    transition: opacity 0.2s;
  }
  #controls:hover { opacity: 1; }
  #controls button {
    font-size: 11px;
    padding: 6px 10px;
    background: rgba(20, 24, 35, 0.85);
    color: #cfd6e4;
    border: 1px solid #2a3550;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  #controls button:hover {
    background: rgba(0, 229, 255, 0.15);
    border-color: var(--neon);
  }
  #controls button.active {
    background: var(--neon);
    color: #0a0e1a;
    border-color: var(--neon);
    font-weight: 700;
  }
</style>
</head>
<body>
  <div id="bridge-status" title="Input bridge (ws://localhost:8765) status">Bridge: 未接続</div>

  <div id="controls">
    <button data-bg="transparent" class="active">透過</button>
    <button data-bg="green">緑</button>
    <button data-bg="dark">暗</button>
    <button id="debug-toggle">Debug</button>
  </div>

  <div id="debug-log" class="hidden">--- Debug: 何か入力すると最新のキー情報を表示 ---</div>

  <div id="app">
    <div id="keyboard"></div>

    <div id="stick-container">
      <div class="stick-group">
        <div class="stick" id="stick-l">
          <div class="ring-outer"></div>
          <div class="ring"></div>
          <div class="axis h"></div>
          <div class="axis v"></div>
          <div class="angle-line"></div>
          <div class="dot"></div>
        </div>
        <div class="stick-angle" id="angle-l">---°</div>
      </div>
      <div class="stick-group">
        <div class="stick" id="stick-r">
          <div class="ring-outer"></div>
          <div class="ring"></div>
          <div class="axis h"></div>
          <div class="axis v"></div>
          <div class="angle-line"></div>
          <div class="dot"></div>
        </div>
        <div class="stick-angle" id="angle-r">---°</div>
      </div>
    </div>
  </div>

<script>
/* ===========================
   Vial Layouts
   =========================== */
const LAYER0 = [
  ["KC_Q", "KC_V", "KC_U", "KC_MINUS", "KC_DOT",   "KC_K", "KC_W", "KC_R", "KC_Y", "KC_P"],
  ["KC_E", "KC_I", "KC_A", "KC_O",     "KC_SLASH", "KC_F", "KC_T", "KC_N", "KC_S", "KC_H"],
  ["KC_Z", "KC_X", "KC_C", "KC_L",     "KC_COMMA", "KC_G", "KC_D", "KC_M", "KC_J", "KC_B"]
];

/* ゲームモード時 (Layer 4) Vial dynamic keymap より */
const LAYER4 = [
  ["KC_LALT",   "KC_T", "KC_G",     "KC_M", "KC_R",      "KC_TAB",   "KC_U",      "KC_I", "KC_O", "KC_P"],
  ["KC_LSHIFT", "KC_Q", "KC_SPACE", "KC_E", "LT6(KC_Z)", "KC_ENTER", "KC_J",      "KC_K", "KC_L", "KC_DELETE"],
  ["KC_LCTRL",  "KC_X", "KC_C",     "KC_V", "KC_F",      "KC_B",     "KC_ESCAPE", "KC_N", "KC_M", "M2"]
];

/* KC_* -> KeyboardEvent.code (USB HID order, layout-independent) */
const KC_TO_CODE = {
  KC_A:"KeyA", KC_B:"KeyB", KC_C:"KeyC", KC_D:"KeyD", KC_E:"KeyE",
  KC_F:"KeyF", KC_G:"KeyG", KC_H:"KeyH", KC_I:"KeyI", KC_J:"KeyJ",
  KC_K:"KeyK", KC_L:"KeyL", KC_M:"KeyM", KC_N:"KeyN", KC_O:"KeyO",
  KC_P:"KeyP", KC_Q:"KeyQ", KC_R:"KeyR", KC_S:"KeyS", KC_T:"KeyT",
  KC_U:"KeyU", KC_V:"KeyV", KC_W:"KeyW", KC_X:"KeyX", KC_Y:"KeyY", KC_Z:"KeyZ",
  KC_MINUS:"Minus", KC_DOT:"Period", KC_SLASH:"Slash", KC_COMMA:"Comma",
  // Layer 4 用追加
  KC_LSHIFT: "ShiftLeft",
  KC_LCTRL:  "ControlLeft",
  KC_LALT:   "AltLeft",
  KC_LGUI:   "MetaLeft",
  KC_RALT:   "AltRight",
  KC_SPACE:  "Space",
  KC_ENTER:  "Enter",
  KC_TAB:    "Tab",
  KC_DELETE: "Delete",
  KC_ESCAPE: "Escape",
  KC_BSPACE: "Backspace",
  "LT6(KC_Z)": "KeyZ",       // タップ動作= Z
  "M2":        "F22"          // M2 マクロ用 (適宜)
};

/* Vialコンボ定義: 単一出力キー -> ソースKC配列 */
const COMBO_OUTPUT_TO_SOURCES = {
  // ファームウェア改修後の F-key シグナル (最も確実、OBS でも動作)
  "F20":        ["KC_A", "KC_O"],                       // CMB_AO  : A+O
  "F21":        ["KC_T", "KC_N"],                       // CMB_TN  : T+N
  "F22":        ["KC_N", "KC_S"],                       // CMB_NS  : N+S
  "F23":        ["KC_MINUS", "KC_V", "KC_U"],           // CMB_VUM : V+U+-
  "F24":        ["KC_X", "KC_C", "KC_V"],               // CMB_XCV : X+C+V
  // 旧方式のフォールバック (ブラウザのネイティブ keydown 経由)
  "Lang2":      ["KC_A", "KC_O"],
  "Lang1":      ["KC_T", "KC_N"],
  "NonConvert": ["KC_T", "KC_N"],
  "Convert":    ["KC_A", "KC_O"],
  "KanaMode":   ["KC_A", "KC_O"]
};

/* マルチキー組み合わせ検出:
   trigger の全キーが同時押下されたら sources を発光.
   Vialマクロ配列(index 0始まり):
     M0 = KC_X + KC_N     <- N+S コンボの出力
     M1 = LGUI+LSHIFT+S
     M2 = LALT+TAB
     M3 = KC_Z + KC_E      <- Z+E コンボの出力 (元々のZ,Eが送られるので自動で光る) */
const COMBO_MULTIKEY_TRIGGERS = [
  // N+S コンボ -> M0 -> X+N が送出される
  { trigger: ["KeyX", "KeyN"], sources: ["KC_N", "KC_S"] }
];

const COMBO_FLASH_MS = 100;
const MIN_ACTIVE_MS  = 100;        // .active クラスを最低この時間は保持
const pressedSet     = new Set();  // 現在押されているコード集合
const keyDownTimes   = new Map();  // code -> 押下時刻 (performance.now())

const KC_LABEL = {
  KC_MINUS:"-", KC_DOT:".", KC_SLASH:"/", KC_COMMA:",",
  // Layer 4
  KC_LSHIFT: "Shft", KC_LCTRL: "Ctl", KC_LALT: "Alt",
  KC_LGUI: "Win", KC_RALT: "AltR",
  KC_SPACE: "Spc", KC_ENTER: "Ent", KC_TAB: "Tab",
  KC_DELETE: "Del", KC_ESCAPE: "Esc", KC_BSPACE: "BS",
  "LT6(KC_Z)": "Z", "M2": "⇄"
};
const labelOf = kc => KC_LABEL[kc] || kc.replace("KC_", "");

/* === Physical layout (Zure-style column-stagger split) ===
   Outer 4 cols on each half + an extra outer key for / and F.
   Inner thumb column has only 2 keys (vertically tight). */
const KEY = 60;
const GAP = 4;
const HALF_GAP = 70;

const keyboard = document.getElementById("keyboard");
const keyEls = {};   // event.code -> element
const elementGrid = [[],[],[]];   // elementGrid[row][col] = element

/* レイアウトごとの (row, col) -> 物理位置 */
const POSITION_MAP = [
  // row 0
  [{c:"L0",r:0},{c:"L1",r:0},{c:"L2",r:0},{c:"L3",r:0},{c:"L_inner",r:0.6},
   {c:"R_inner",r:0.6},{c:"R0",r:0},{c:"R1",r:0},{c:"R2",r:0},{c:"R3",r:0}],
  // row 1 (col4,5 は L_extra / R_extra)
  [{c:"L0",r:1},{c:"L1",r:1},{c:"L2",r:1},{c:"L3",r:1},{c:"L_extra",r:1},
   {c:"R_extra",r:1},{c:"R0",r:1},{c:"R1",r:1},{c:"R2",r:1},{c:"R3",r:1}],
  // row 2
  [{c:"L0",r:2},{c:"L1",r:2},{c:"L2",r:2},{c:"L3",r:2},{c:"L_inner",r:1.6},
   {c:"R_inner",r:1.6},{c:"R0",r:2},{c:"R1",r:2},{c:"R2",r:2},{c:"R3",r:2}]
];

const COL_X = (() => {
  const rowH  = KEY + GAP;
  const halfW = 5 * rowH - GAP;
  return {
    L_extra: 0,
    L0: rowH, L1: 2*rowH, L2: 3*rowH, L3: 4*rowH,
    L_inner: 5*rowH,
    R_inner: rowH + halfW + HALF_GAP,
    R0: rowH + halfW + HALF_GAP + 1*rowH,
    R1: rowH + halfW + HALF_GAP + 2*rowH,
    R2: rowH + halfW + HALF_GAP + 3*rowH,
    R3: rowH + halfW + HALF_GAP + 4*rowH,
    R_extra: rowH + halfW + HALF_GAP + 5*rowH
  };
})();
const COL_STAG = {
  L_extra: 14, L0: 14, L1: 4, L2: 0, L3: 10, L_inner: 0,
  R_inner: 0, R0: 10, R1: 0, R2: 4, R3: 14, R_extra: 14
};

(function buildKeyboard() {
  const rowH = KEY + GAP;
  let maxX = 0, maxY = 0;
  POSITION_MAP.forEach((rowArr, row) => {
    rowArr.forEach((pos, col) => {
      const x = COL_X[pos.c];
      const y = pos.r * rowH + COL_STAG[pos.c];
      const div = document.createElement("div");
      div.className = "key";
      div.style.left = x + "px";
      div.style.top  = y + "px";
      keyboard.appendChild(div);
      elementGrid[row][col] = div;
      if (x + KEY > maxX) maxX = x + KEY;
      if (y + KEY > maxY) maxY = y + KEY;
    });
  });
  keyboard.style.width  = maxX + "px";
  keyboard.style.height = maxY + "px";
})();

/* レイヤー適用 (テキストと event.code マッピングを更新) */
function applyLayer(layerArr) {
  // 既存マッピングをクリアして再構築
  Object.keys(keyEls).forEach(k => delete keyEls[k]);
  // アクティブ状態もクリア (レイヤーが変わるため意味がない)
  document.querySelectorAll(".key").forEach(el => {
    el.classList.remove("active");
    el.classList.remove("combo");
    if (el._activeOffTimer) { clearTimeout(el._activeOffTimer); el._activeOffTimer = null; }
    if (el._comboTimer)     { clearTimeout(el._comboTimer);     el._comboTimer = null; }
  });
  pressedSet.clear();
  keyDownTimes.clear();

  layerArr.forEach((rowArr, row) => {
    rowArr.forEach((kc, col) => {
      const el = elementGrid[row][col];
      if (!el) return;
      el.textContent = labelOf(kc);
      const code = KC_TO_CODE[kc];
      if (code) {
        el.dataset.code = code;
        keyEls[code] = el;
      } else {
        delete el.dataset.code;
      }
    });
  });
}

/* ゲームモード状態と切替 */
let gameMode = false;
const gameModeIndicator = document.createElement("div");
gameModeIndicator.id = "gamemode-indicator";
gameModeIndicator.style.cssText =
  "position:fixed;top:10px;left:160px;font-family:Consolas,monospace;font-size:11px;" +
  "padding:5px 10px;border-radius:12px;background:rgba(20,24,35,0.85);border:1px solid #2a3550;" +
  "color:#aab2c0;z-index:100;opacity:0.6;transition:opacity 0.2s;";
gameModeIndicator.textContent = "Mode: TYPING";
gameModeIndicator.title = "Click to toggle (or fire V+U+- combo)";
gameModeIndicator.style.cursor = "pointer";
document.body.appendChild(gameModeIndicator);

function setGameMode(on) {
  gameMode = on;
  if (gameMode) {
    applyLayer(LAYER4);
    gameModeIndicator.textContent = "Mode: GAME";
    gameModeIndicator.style.color = "#ff66dd";
    gameModeIndicator.style.borderColor = "#ff66dd";
  } else {
    applyLayer(LAYER0);
    gameModeIndicator.textContent = "Mode: TYPING";
    gameModeIndicator.style.color = "#aab2c0";
    gameModeIndicator.style.borderColor = "#2a3550";
  }
}
function toggleGameMode() { setGameMode(!gameMode); }
gameModeIndicator.addEventListener("click", toggleGameMode);

// 初期レイヤー適用
applyLayer(LAYER0);

/* ===========================
   Keyboard input
   =========================== */
function setActive(code, on) {
  const el = keyEls[code];
  if (!el) return;
  if (on) {
    el.classList.add("active");
    keyDownTimes.set(code, performance.now());
    if (el._activeOffTimer) { clearTimeout(el._activeOffTimer); el._activeOffTimer = null; }
  } else {
    const downTime = keyDownTimes.get(code) || 0;
    const elapsed  = performance.now() - downTime;
    keyDownTimes.delete(code);
    if (elapsed >= MIN_ACTIVE_MS) {
      el.classList.remove("active");
    } else {
      if (el._activeOffTimer) clearTimeout(el._activeOffTimer);
      el._activeOffTimer = setTimeout(() => {
        el.classList.remove("active");
        el._activeOffTimer = null;
      }, MIN_ACTIVE_MS - elapsed);
    }
  }
}

function flashCombo(sourceKCs) {
  sourceKCs.forEach(kc => {
    const code = KC_TO_CODE[kc];
    const el = keyEls[code];
    if (!el) return;
    el.classList.add("combo");
    clearTimeout(el._comboTimer);
    el._comboTimer = setTimeout(() => el.classList.remove("combo"), COMBO_FLASH_MS);
  });
}

function checkMultiKeyCombos() {
  for (const c of COMBO_MULTIKEY_TRIGGERS) {
    if (c.trigger.every(k => pressedSet.has(k))) {
      flashCombo(c.sources);
    }
  }
}

/* BRIDGE と NATIVE が同じイベントを重複送出する対策 (dedup) */
const lastEventAt = new Map();   // "DOWN:F23" or "UP:F23" -> timestamp
const DEDUP_MS = 70;             // この時間内の同一イベントは重複と判定

function isDuplicate(kind, code) {
  const key = kind + ":" + code;
  const now = performance.now();
  const last = lastEventAt.get(key) || 0;
  if (now - last < DEDUP_MS) return true;
  lastEventAt.set(key, now);
  return false;
}

function handleKeydown(code, src) {
  const dup = isDuplicate("DOWN", code);
  if (dup) {
    logDebug("DOWN*", code, src, null);   // * = 重複として無視
    return;
  }
  pressedSet.add(code);
  setActive(code, true);
  let flashed = null;
  const sources = COMBO_OUTPUT_TO_SOURCES[code];
  if (sources) {
    flashCombo(sources);
    flashed = sources;
  }
  // multi-key combo
  for (const c of COMBO_MULTIKEY_TRIGGERS) {
    if (c.trigger.every(k => pressedSet.has(k))) {
      flashCombo(c.sources);
      flashed = (flashed || []).concat(c.sources);
    }
  }
  // ゲームモード切替 (V+U+- or X+C+V コンボ = F23/F24 シグナル)
  if (code === "F23" || code === "F24") {
    setTimeout(toggleGameMode, COMBO_FLASH_MS + 30);
  }
  logDebug("DOWN", code, src, flashed);
}

function handleKeyup(code, src) {
  if (isDuplicate("UP", code)) {
    logDebug("UP*", code, src, null);
    return;
  }
  pressedSet.delete(code);
  setActive(code, false);
  // IMEに押下を奪われて keyup しか届かないケースの救済:
  // コンボ出力キー (Lang1/Lang2など) は keyup でもフラッシュさせる
  let flashed = null;
  const sources = COMBO_OUTPUT_TO_SOURCES[code];
  if (sources) {
    flashCombo(sources);
    flashed = sources;
  }
  logDebug("UP", code, src, flashed);
}

window.addEventListener("keydown", e => handleKeydown(e.code, "NATIVE"));
window.addEventListener("keyup",   e => handleKeyup(e.code, "NATIVE"));
window.addEventListener("blur", () => {
  pressedSet.clear();
  Object.values(keyEls).forEach(el => {
    el.classList.remove("active");
    el.classList.remove("combo");
  });
});

/* ===========================
   Debug overlay
   =========================== */
const debugLog = document.getElementById("debug-log");
const debugToggle = document.getElementById("debug-toggle");
let debugEnabled = false;
const debugHistory = [];

debugToggle.addEventListener("click", () => {
  debugEnabled = !debugEnabled;
  debugToggle.classList.toggle("active", debugEnabled);
  debugLog.classList.toggle("hidden", !debugEnabled);
});

let debugSeq = 0;
function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
}
function logDebug(kind, code, src, flashedKCs) {
  if (!debugEnabled) return;
  debugSeq++;
  const mapped = Object.entries(KC_TO_CODE).find(([kc, c]) => c === code);
  const mapLabel = mapped ? mapped[0] : "(未マップ)";
  const mapCls   = mapped ? "" : "dbg-unmap";
  const srcCls   = src === "BRIDGE" ? "dbg-bridge" : "dbg-native";
  const kindCls  = kind === "DOWN" ? "dbg-down" : "dbg-up";
  const flashTxt = flashedKCs && flashedKCs.length
      ? `  <span class="dbg-flash">★FLASH→ ${escHtml(flashedKCs.join(","))}</span>`
      : "";
  const line =
    `<span style="color:#666">#${String(debugSeq).padStart(3,"0")}</span>` +
    ` <span class="${srcCls}">[${src.padEnd(6)}]</span>` +
    ` <span class="${kindCls}">${kind.padEnd(4)}</span>` +
    ` ${escHtml(code).padEnd(16)}` +
    ` <span class="${mapCls}">${escHtml(mapLabel)}</span>` +
    flashTxt;
  debugHistory.unshift(line);
  if (debugHistory.length > 14) debugHistory.pop();
  debugLog.innerHTML =
    `<span class="dbg-head">Debug log (newest first) — Bridge=via WebSocket / Native=ブラウザ直</span>` +
    debugHistory.join("\n");
}

/* ===========================
   WebSocket bridge (global input)
   =========================== */
const bridgeStatusEl = document.getElementById("bridge-status");
const bridgeState = {
  connected: false,
  gamepad: null,   // {connected, lx, ly} or null
};

function connectBridge() {
  let ws;
  try {
    ws = new WebSocket("ws://localhost:8765");
  } catch (err) {
    setTimeout(connectBridge, 2000);
    return;
  }

  ws.onopen = () => {
    bridgeState.connected = true;
    bridgeStatusEl.textContent = "Bridge: 接続";
    bridgeStatusEl.classList.add("ok");
  };
  ws.onclose = () => {
    bridgeState.connected = false;
    bridgeState.gamepad = null;
    bridgeStatusEl.textContent = "Bridge: 未接続";
    bridgeStatusEl.classList.remove("ok");
    pressedSet.clear();
    Object.values(keyEls).forEach(el => {
      el.classList.remove("active");
      el.classList.remove("combo");
    });
    setTimeout(connectBridge, 2000);
  };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch (e) { return; }
    if (msg.type === "keydown") {
      handleKeydown(msg.code, "BRIDGE");
    } else if (msg.type === "keyup") {
      handleKeyup(msg.code, "BRIDGE");
    } else if (msg.type === "gamepad") {
      bridgeState.gamepad = msg.connected ? msg : null;
    }
  };
}
connectBridge();

/* ===========================
   Gamepad (両スティック)
   =========================== */
const DEADZONE        = 0.08;
const STICK_RADIUS_PX = 32;     // 90px stick の中で dot が動ける半径

/* 各スティックの DOM 要素 */
const stickViews = {
  L: {
    dot:       document.querySelector("#stick-l .dot"),
    angleLine: document.querySelector("#stick-l .angle-line"),
    angleText: document.getElementById("angle-l"),
  },
  R: {
    dot:       document.querySelector("#stick-r .dot"),
    angleLine: document.querySelector("#stick-r .angle-line"),
    angleText: document.getElementById("angle-r"),
  }
};

/* 擬似スティック (タイピングモード時のみ)
   firmware側で各方向に対応する F-key が hold される:
     左X: -(LCTRL=既存)  / +(F14)
     左Y: -(LSHIFT=既存) / +(F13)
     右X: -(F16=物理右)  / +(F15=物理左)   ※配線極性逆
     右Y: -(F17=物理上)  / +(F18=物理下) */
const PSEUDO_HOLD_MS = 50;
function isHeld(code) {
  const t = keyDownTimes.get(code);
  return t != null && performance.now() - t >= PSEUDO_HOLD_MS;
}
function computePseudoSticks() {
  if (gameMode) return { L: null, R: null };
  let lx = 0, ly = 0, rx = 0, ry = 0;
  // 左スティック
  if (isHeld("ControlLeft")) lx = -0.85;   // LCTRL → 物理左
  if (isHeld("F14"))         lx = +0.85;   // F14   → 物理右 (MO(2))
  if (isHeld("F13"))         ly = -0.85;   // F13   → 物理上 (MO(3))
  if (isHeld("ShiftLeft"))   ly = +0.85;   // LSHIFT→ 物理下
  // 右スティック
  if (isHeld("F15"))         rx = -0.85;   // F15   → 物理左
  if (isHeld("F16"))         rx = +0.85;   // F16   → 物理右
  if (isHeld("F17"))         ry = -0.85;   // F17   → 物理上
  if (isHeld("F18"))         ry = +0.85;   // F18   → 物理下
  return {
    L: (lx || ly) ? {x: lx, y: ly} : null,
    R: (rx || ry) ? {x: rx, y: ry} : null
  };
}

function readSticks() {
  let l = {x:0, y:0}, r = {x:0, y:0};

  if (bridgeState.gamepad && bridgeState.gamepad.connected) {
    l.x = bridgeState.gamepad.lx || 0;
    l.y = bridgeState.gamepad.ly || 0;
    r.x = bridgeState.gamepad.rx || 0;
    r.y = bridgeState.gamepad.ry || 0;
  } else {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    let pad = null;
    for (const p of pads) { if (p) { pad = p; break; } }
    if (pad) {
      l.x = pad.axes[0] || 0;
      l.y = pad.axes[1] || 0;
      r.x = pad.axes[2] || 0;
      r.y = pad.axes[3] || 0;
    }
  }

  /* 物理入力なしなら擬似 (左右独立) */
  const lMag = Math.sqrt(l.x*l.x + l.y*l.y);
  const rMag = Math.sqrt(r.x*r.x + r.y*r.y);
  if (lMag < DEADZONE || rMag < DEADZONE) {
    const pseudo = computePseudoSticks();
    if (lMag < DEADZONE && pseudo.L) l = pseudo.L;
    if (rMag < DEADZONE && pseudo.R) r = pseudo.R;
  }
  return { L: l, R: r };
}

function renderStick(view, x, y) {
  const mag = Math.sqrt(x*x + y*y);
  const inDead = mag < DEADZONE;

  const px = x * STICK_RADIUS_PX;
  const py = y * STICK_RADIUS_PX;
  view.dot.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;

  if (inDead) {
    view.dot.style.opacity       = "0.3";
    view.angleLine.style.opacity = "0";
    view.angleText.textContent   = "---°";
  } else {
    const angleDeg = Math.atan2(-y, x) * 180 / Math.PI;
    view.dot.style.opacity       = "1";
    view.angleText.textContent   = (angleDeg >= 0 ? "+" : "") + angleDeg.toFixed(1) + "°";
    const cssRot = 90 - angleDeg;
    view.angleLine.style.transform = `translate(-50%, 0) rotate(${cssRot}deg)`;
    view.angleLine.style.opacity   = (Math.min(mag, 1) * 0.85).toFixed(2);
    view.angleLine.style.height    = (Math.min(mag, 1) * STICK_RADIUS_PX) + "px";
  }
}

function poll() {
  const s = readSticks();
  renderStick(stickViews.L, s.L.x, s.L.y);
  renderStick(stickViews.R, s.R.x, s.R.y);
  requestAnimationFrame(poll);
}
requestAnimationFrame(poll);

/* ===========================
   Background toggle (for OBS)
   =========================== */
document.querySelectorAll("#controls button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll("#controls button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.body.classList.remove("bg-green", "bg-dark");
    const bg = btn.dataset.bg;
    if (bg === "green") document.body.classList.add("bg-green");
    else if (bg === "dark") document.body.classList.add("bg-dark");
  });
});
</script>
